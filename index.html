<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIXED INCOME TERMINAL — Global Bond Market Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;700;800&family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#080c10;--bg2:#0d1117;--bg3:#111820;--bg4:#1a2333;
    --border:#1e2d3d;--border2:#243447;
    --text:#c9d1d9;--text2:#8b949e;--text3:#4a5568;
    --amber:#f5a623;--green:#3fb950;--red:#f85149;
    --blue:#58a6ff;--cyan:#39c5cf;--purple:#bc8cff;--teal:#1abc9c;
    --heading:#e6edf3;--glow-a:rgba(245,166,35,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:12px;line-height:1.5;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:998;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}

  /* ── HEADER ── */
  header{border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(8,12,16,0.97);backdrop-filter:blur(12px);}
  .header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--amber);letter-spacing:0.15em;text-transform:uppercase;}
  .logo span{color:var(--text2);font-weight:400;}
  .header-right{display:flex;gap:16px;align-items:center;font-size:11px;color:var(--text2);}
  .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;}
  .live-dot.stale{background:var(--amber);box-shadow:0 0 8px var(--amber);}
  .live-dot.error{background:var(--red);box-shadow:0 0 8px var(--red);animation:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .refresh-btn{padding:4px 10px;border-radius:3px;background:none;border:1px solid var(--border2);color:var(--text2);font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.15s;}
  .refresh-btn:hover{border-color:var(--amber);color:var(--amber);}
  .data-status{font-size:10px;}
  .header-nav{display:flex;padding:0 24px;overflow-x:auto;}
  .nav-btn{padding:10px 16px;background:none;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.08em;color:var(--text3);border-bottom:2px solid transparent;text-transform:uppercase;transition:all 0.15s;white-space:nowrap;}
  .nav-btn:hover{color:var(--text);}
  .nav-btn.active{color:var(--amber);border-bottom-color:var(--amber);}

  /* ── TICKER ── */
  .ticker-strip{background:var(--bg3);border-bottom:1px solid var(--border);overflow:hidden;height:34px;display:flex;align-items:center;}
  .ticker-scroll{display:flex;gap:0;animation:tickerScroll 40s linear infinite;white-space:nowrap;}
  @keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .ticker-item{padding:0 20px;display:flex;gap:8px;align-items:center;border-right:1px solid var(--border);height:34px;}
  .ticker-name{color:var(--text2);font-size:11px;}
  .ticker-val{color:var(--heading);font-size:11px;font-weight:700;}
  .ticker-chg{font-size:10px;}

  /* ── LAYOUT ── */
  .main{padding:20px 24px;max-width:1800px;margin:0 auto;}
  .section-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .section{margin-bottom:28px;}
  .page-section{display:none;}
  .page-section.active{display:block;}

  /* ── PANELS ── */
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .panel-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg3);}
  .panel-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--heading);display:flex;align-items:center;gap:8px;}
  .panel-sub{font-size:10px;color:var(--text3);}
  .panel-body{padding:0;}
  .chart-wrap{padding:16px;position:relative;}
  .chart-wrap canvas{display:block;}

  /* ── STAT CARDS ── */
  .stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:14px;display:flex;flex-direction:column;gap:4px;position:relative;}
  .stat-label{font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;}
  .stat-val{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:0.06em;color:var(--heading);line-height:1;margin:3px 0;}
  .stat-chg{font-size:11px;font-family:'DM Mono',monospace;font-weight:500;}
  .stat-source{font-size:8px;color:var(--text3);margin-top:2px;letter-spacing:0.05em;}

  /* ── TABLES ── */
  .bond-table{width:100%;border-collapse:collapse;}
  .bond-table thead tr{background:var(--bg4);}
  .bond-table th{padding:7px 10px;text-align:right;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);font-weight:400;border-bottom:1px solid var(--border);white-space:nowrap;}
  .bond-table th:first-child{text-align:left;}
  .bond-table td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);font-size:11px;color:var(--text);}
  .bond-table td:first-child{text-align:left;}
  .bond-table tbody tr:last-child td{border-bottom:none;}
  .bond-table tbody tr:hover{background:var(--bg4);}
  .bond-table .row-group td{background:rgba(26,35,51,0.5);color:var(--text2);font-size:10px;letter-spacing:0.05em;padding:5px 10px;}
  .t-name{color:var(--heading);font-weight:700;}
  .t-val{color:var(--heading);font-variant-numeric:tabular-nums;}
  .t-pos{color:var(--green);}
  .t-neg{color:var(--red);}
  .t-neu{color:var(--text2);}
  .badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;}
  .badge-up{background:rgba(63,185,80,0.15);color:var(--green);}
  .badge-down{background:rgba(248,81,73,0.15);color:var(--red);}

  /* ── TABS ── */
  .tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg3);}
  .tab{padding:8px 14px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:'Space Mono',monospace;transition:all 0.15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

  /* ── YIELD CURVE CONTROLS ── */
  .yield-controls{display:flex;gap:8px;padding:12px 14px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg3);}
  .geo-btn{padding:4px 10px;border-radius:3px;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border2);background:none;font-family:'Space Mono',monospace;color:var(--text2);transition:all 0.15s;}
  .geo-btn:hover{border-color:var(--text2);color:var(--text);}
  .geo-btn.active{border-color:var(--amber);color:var(--amber);background:var(--glow-a);}

  /* ── HEATMAP ── */
  .heatmap-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;padding:16px;}
  .heatmap-header{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;padding:0 16px;margin-bottom:4px;}
  .hm-label{font-size:9px;text-align:center;color:var(--text3);letter-spacing:0.04em;}
  .hm-row-label{font-size:9px;color:var(--text3);text-align:right;padding-right:8px;}
  .hm-cell{height:36px;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden;}
  .hm-cell:hover{transform:scale(1.08);z-index:10;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
  .hm-cell span{font-size:8px;line-height:1.2;text-align:center;font-weight:700;}
  .hm-cell .hm-sub{font-size:7px;opacity:0.75;}
  .hm-legend{display:flex;gap:16px;padding:8px 16px 14px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--text2);}
  .legend-dot{width:8px;height:8px;border-radius:2px;}

  /* ── GOV CONTROLS ── */
  .gov-controls{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg3);flex-wrap:wrap;align-items:center;}
  .gov-check{display:flex;align-items:center;gap:5px;font-size:10px;cursor:pointer;user-select:none;}
  .check-dot{width:10px;height:10px;border-radius:2px;}

  /* ── HM TOOLTIP ── */
  .hm-tooltip{position:fixed;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:8px 12px;pointer-events:none;z-index:500;font-size:10px;color:var(--text);display:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
  .hm-tooltip strong{color:var(--heading);display:block;margin-bottom:2px;}

  /* ── INFO BUTTON ── */
  .info-wrap{position:relative;display:inline-flex;align-items:center;z-index:10;}
  .info-btn{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:rgba(88,166,255,0.10);border:1px solid rgba(88,166,255,0.28);color:var(--blue);font-size:9px;font-family:'Syne',sans-serif;font-weight:800;cursor:help;transition:all 0.15s;flex-shrink:0;user-select:none;line-height:1;}
  .info-btn:hover,.info-wrap:hover .info-btn{background:rgba(88,166,255,0.20);border-color:var(--blue);box-shadow:0 0 8px rgba(88,166,255,0.35);}
  .info-popup{position:absolute;z-index:900;top:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(4px) scale(0.97);transform-origin:top center;width:290px;background:#0b1929;border:1px solid rgba(88,166,255,0.45);border-radius:7px;padding:13px 15px;box-shadow:0 16px 48px rgba(0,0,0,0.75);pointer-events:none;opacity:0;transition:opacity 0.18s ease,transform 0.18s ease;font-family:'Space Mono',monospace;font-size:10px;line-height:1.65;color:var(--text);white-space:normal;}
  .info-popup::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%) rotate(45deg);width:8px;height:8px;background:#0b1929;border-left:1px solid rgba(88,166,255,0.45);border-top:1px solid rgba(88,166,255,0.45);}
  .info-popup.pop-left{left:0;transform:translateX(0) translateY(4px) scale(0.97);transform-origin:top left;}
  .info-popup.pop-left::before{left:14px;transform:translateX(0) rotate(45deg);}
  .info-popup.pop-right{left:auto;right:0;transform:translateX(0) translateY(4px) scale(0.97);transform-origin:top right;}
  .info-popup.pop-right::before{left:auto;right:14px;transform:translateX(0) rotate(45deg);}
  .info-wrap:hover .info-popup{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
  .info-wrap:hover .info-popup.pop-left{transform:translateX(0) translateY(0) scale(1);}
  .info-wrap:hover .info-popup.pop-right{transform:translateX(0) translateY(0) scale(1);}
  .info-popup strong{display:block;color:var(--blue);font-family:'Syne',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;font-weight:700;}
  .info-popup p{color:var(--text2);margin-bottom:5px;}
  .info-popup p:last-child{margin-bottom:0;}
  .info-popup b{color:var(--amber);}

  /* ── EMPTY / LOADING STATES ── */
  .loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--text3);}
  .loading-spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .no-data{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--text3);font-size:11px;gap:8px;}
  .no-data-icon{font-size:20px;opacity:0.4;}
  .err-banner{background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.2);border-radius:6px;padding:12px 16px;margin-bottom:16px;font-size:11px;color:var(--red);display:flex;align-items:flex-start;gap:10px;}
  .warn-banner{background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.2);border-radius:6px;padding:12px 16px;margin-bottom:16px;font-size:11px;color:var(--amber);display:flex;align-items:flex-start;gap:10px;}
  .source-tag{display:inline-block;padding:1px 6px;border-radius:3px;background:rgba(88,166,255,0.1);color:var(--blue);font-size:8px;letter-spacing:0.05em;margin-left:6px;}

  .fade-in{animation:fadeIn 0.4s ease forwards;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  @media(max-width:1200px){.grid-4{grid-template-columns:1fr 1fr;}}
  @media(max-width:800px){.grid-2,.grid-4{grid-template-columns:1fr;}.heatmap-grid{grid-template-columns:repeat(5,1fr);}}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">Fixed Income Terminal <span>/ Global Bond Market</span></div>
    <div class="header-right">
      <span id="data-status" class="data-status" style="color:var(--text3)">Loading…</span>
      <span style="color:var(--border2)">|</span>
      <span id="live-time">--:--:-- UTC</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="showSection('us',this)">🇺🇸 US Markets</button>
    <button class="nav-btn" onclick="showSection('eu',this)">🇪🇺 EU Markets</button>
    <button class="nav-btn" onclick="showSection('cn',this)">🇨🇳 China Markets</button>
    <button class="nav-btn" onclick="showSection('jp',this)">🇯🇵 Japan Markets</button>
    <button class="nav-btn" onclick="showSection('curves',this)">Yield Curves</button>
    <button class="nav-btn" onclick="showSection('derivatives',this)">Derivatives</button>
    <button class="nav-btn" onclick="showSection('govbonds',this)">Gov Bonds</button>
  </nav>
</header>

<div class="ticker-strip"><div class="ticker-scroll" id="ticker-scroll">
  <div class="ticker-item"><span class="ticker-name">Loading market data…</span></div>
</div></div>

<div class="hm-tooltip" id="hm-tooltip"></div>

<div class="main" id="main-content">
  <div class="loading-overlay" id="global-loading">
    <div class="loading-spinner"></div>
    <span>Fetching live bond market data…</span>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let DATA = null;          // bonds.json content
let currentSection = 'us';
let yieldChart = null, spreadChartInst = null, govChart = null, oiChartInst = null;
let activeYieldGeos = [];

const $ = id => document.getElementById(id);
const fmt = (v, d=2) => (v != null ? Number(v).toFixed(d) : '—');
const fmtBps = v => v != null ? Math.round(v) + ' bps' : '—';
const na = () => `<span class="t-neu">—</span>`;

Chart.defaults.color = '#8b949e';
Chart.defaults.borderColor = '#1e2d3d';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 10;

/* ── CLOCK ── */
function updateClock(){$('live-time').textContent=new Date().toUTCString().split(' ')[4]+' UTC';}
setInterval(updateClock,1000); updateClock();

/* ── SMART POPUP POSITION ── */
document.addEventListener('mouseenter', e => {
  const w = e.target.closest && e.target.closest('.info-wrap');
  if (!w) return;
  const p = w.querySelector('.info-popup');
  if (!p) return;
  p.classList.remove('pop-left','pop-right');
  const r = w.getBoundingClientRect();
  if (r.left < 220) p.classList.add('pop-left');
  else if (window.innerWidth - r.right < 300) p.classList.add('pop-right');
}, true);

/* ══════════════════════════════════════
   DATA LOADING
══════════════════════════════════════ */
async function loadData() {
  const status = $('data-status');
  status.textContent = 'Loading…';
  status.style.color = 'var(--text3)';
  try {
    const resp = await fetch(`data/bonds.json?t=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
    renderAll();
    // Status indicator
    if (DATA.last_updated) {
      const dt = new Date(DATA.last_updated);
      const ageH = (Date.now() - dt.getTime()) / 36e5;
      const dot = '<span class="live-dot' + (ageH > 72 ? ' stale' : '') + '"></span> ';
      const label = dt.toLocaleDateString('en-GB', {day:'2-digit',month:'short'}) + ' ' + dt.toUTCString().split(' ')[4];
      status.innerHTML = dot + 'Last update: ' + label;
    } else {
      status.innerHTML = '<span class="live-dot error"></span> No data yet — run GitHub Actions workflow';
    }
    const errors = DATA.errors || {};
    if (Object.keys(errors).length) {
      const noPlaceholder = Object.keys(errors).filter(k => k !== '_placeholder');
      if (noPlaceholder.length)
        status.innerHTML += ` &nbsp;·&nbsp; <span style="color:var(--amber)">${noPlaceholder.length} source(s) partial</span>`;
    }
  } catch(e) {
    console.error(e);
    status.innerHTML = '<span class="live-dot error"></span> Failed to load data';
    $('main-content').innerHTML = `
      <div class="err-banner">
        <span>⚠</span>
        <div><b>Cannot load bond data.</b><br>
        Make sure <code>data/bonds.json</code> exists in the repo and the GitHub Actions workflow has run at least once.<br>
        You can trigger it manually: GitHub → Actions → "Update Bond Market Data" → Run workflow.</div>
      </div>`;
  }
}

/* ══════════════════════════════════════
   RENDER ALL
══════════════════════════════════════ */
function renderAll() {
  $('main-content').innerHTML = buildHTML();
  renderTicker();
  // Reinit charts for current section
  setTimeout(() => initChartsForSection(currentSection), 60);
}

function buildHTML() {
  return `
    ${buildErrorBanners()}
    <!-- US -->
    <div class="page-section ${currentSection==='us'?'active':''}" id="sec-us">
      <div class="section">
        <div class="section-label">US Bond Market — Overview</div>
        <div class="grid-4">${buildUSKPIs()}</div>
      </div>
      <div class="section">
        <div class="section-label">Agency Bond Market</div>
        <div class="grid-2">
          ${buildPanel('Securities Overview','OAS vs Treasuries · FRED','pop-left',INFO.agencySec,buildAgencyFREDTable())}
          ${buildPanel('US Credit Market','IG & HY option-adjusted spreads','pop-right',INFO.tradeTypes,buildFREDCreditTable())}
        </div>
      </div>
      <div class="section">
        <div class="section-label">Corporate 144A Bond Market</div>
        <div class="grid-2">
          ${buildPanel('IG & HY Spreads','ICE BofA indices via FRED','pop-left',INFO.corp144a,buildCorpFREDTable())}
          ${buildPanel('Spread History','24-month OAS evolution','pop-right',INFO.tradeTypes,buildFREDCreditNote())}
        </div>
      </div>
    </div>
    <!-- EU -->
    <div class="page-section ${currentSection==='eu'?'active':''}" id="sec-eu">
      <div class="section">
        <div class="section-label">EU Bond Market — Overview</div>
        <div class="grid-4">${buildEUKPIs()}</div>
      </div>
      <div class="section">
        <div class="section-label">EU Government &amp; Corporate Bonds</div>
        <div class="grid-2">
          ${buildPanel('EU Yield Curve','ECB Statistical Data Warehouse','pop-left',INFO.euSec,buildECBTable())}
          ${buildPanel('EURIBOR &amp; Key Rates','Short-term EU rates','pop-right',INFO.tradeTypes,buildEURIBORPanel())}
        </div>
      </div>
    </div>
    <!-- CN -->
    <div class="page-section ${currentSection==='cn'?'active':''}" id="sec-cn">
      <div class="section">
        <div class="section-label">China Bond Market — Overview</div>
        <div class="grid-4">${buildCNKPIs()}</div>
      </div>
      <div class="section">
        <div class="section-label">China Interbank &amp; Exchange Bond Market</div>
        <div class="grid-2">
          ${buildPanel('Market Overview','ADB Asian Bonds Online · CCDC','pop-left',INFO.cnSec,buildChinaTable())}
          ${buildPanel('Data Sources','ADB / CCDC / World Bank','pop-right',INFO.tradeTypes,buildChinaSourcesCard())}
        </div>
      </div>
    </div>
    <!-- JP -->
    <div class="page-section ${currentSection==='jp'?'active':''}" id="sec-jp">
      <div class="section">
        <div class="section-label">Japan Bond Market — Overview</div>

/* ── HTML HELPERS ── */
function infoBtn(info, pos='pop-left') {
  return `<span class="info-wrap"><span class="info-btn">i</span><div class="info-popup ${pos}"><strong>${info.title}</strong>${info.body}</div></span>`;
}
function buildPanel(title, sub, pos, info, body) {
  return `<div class="panel fade-in">
    <div class="panel-header">
      <span class="panel-title">${title} ${infoBtn(info,pos)}</span>
      <span class="panel-sub">${sub}</span>
    </div>
    <div class="panel-body">${body}</div>
  </div>`;
}
function noData(msg='No live data available') {
  return `<div class="no-data"><span class="no-data-icon">📡</span>${msg}</div>`;
}
function buildErrorBanners() {
  if (!DATA) return '';
  const errs = DATA.errors || {};
  const keys = Object.keys(errs).filter(k => k !== '_placeholder');
  if (!keys.length) return '';
  return `<div class="warn-banner"><span>⚠</span><div>
    <b>Partial data</b> — ${keys.length} source(s) unavailable: <b>${keys.join(', ')}</b><br>
    Check GitHub Secrets (FRED_API_KEY, FINRA_API_KEY) and re-run the workflow.
  </div></div>`;
}

function buildUSKPIs() {
  const fred = DATA?.fred || {};

  const t10idx = (ust.tenors || []).indexOf('10Y');

  const y2 = t2idx >= 0 ? ust.yields[t2idx] : null;

  const cards = [
    { label:'UST 10Y Yield',    val: y10 != null ? fmt(y10,2)+'%' : '—', chg: fred.t10y2y != null ? (fred.t10y2y > 0 ? '▲' : '▼') + fmt(Math.abs(fred.t10y2y),2)+'% 2Y-10Y spread' : '', src:'US Treasury', pos: y10 != null },
    { label:'IG OAS Spread',    val: fred.ig_spread_bps != null ? fmtBps(fred.ig_spread_bps) : '—', chg: fred.ig_date || '', src:'FRED BAMLC0A0CM', pos: true },
    { label:'HY OAS Spread',    val: fred.hy_spread_bps != null ? fmtBps(fred.hy_spread_bps) : '—', chg: fred.hy_date || '', src:'FRED BAMLH0A0HYM2', pos: true },
    { label:'SOFR',             val: fred.sofr != null ? fmt(fred.sofr,2)+'%' : '—', chg: fred.sofr_date || '', src:'FRED SOFR', pos: true },

function buildFinraAgencyTable() {
  const f = DATA?.finra;

  const a = f.agency;
  const date = f.date ? `<div style="padding:8px 10px;font-size:9px;color:var(--text3)">Week ending ${f.date}</div>` : '';
  return date + `<table class="bond-table"><thead><tr>
    <th>Issuer</th><th>Buy Vol $M</th><th>Sell Vol $M</th><th>Inter-dealer $M</th><th>Trades</th>
  </tr></thead><tbody>

  return Object.entries(issuers).slice(0,6).map(([name, vol]) =>
    `<tr><td class="t-name" style="padding-left:20px;font-size:10px">${name}</td>
     <td class="t-val">${vol != null ? fmt(vol,0) : '—'}</td>
     <td colspan="3"></td></tr>`
  ).join('');
}

function buildFinraTradeTable() {
  const f = DATA?.finra;
  if (!f || !f.agency) return noData('FINRA API key required — see README');
  const rows = [
    {cat:'Affiliate',    rows:[{name:'Buy',k:'buy_volume_mm'},{name:'Sell',k:'sell_volume_mm'},{name:'Net',k:null}]},
    {cat:'Inter-dealer', rows:[{name:'Volume',k:'interdealer_vol_mm'}]},
  ];
  let html = `<table class="bond-table"><thead><tr>
    <th>Category</th><th>Side</th><th>Volume $M</th><th>Trades</th>
  </tr></thead><tbody>`;
  const a = f.agency || {};
  rows.forEach(cat => {
    html += `<tr class="row-group"><td colspan="4">${cat.cat}</td></tr>`;
    cat.rows.forEach(r => {
      const vol = r.k ? (a[r.k] != null ? fmt(a[r.k],0) : '—') :
        (a.buy_volume_mm != null && a.sell_volume_mm != null) ? fmt(a.buy_volume_mm - a.sell_volume_mm, 0) : '—';
      html += `<tr><td></td><td class="t-name">${r.name}</td><td class="t-val">${vol}</td><td class="t-val">${r.name==='Volume'?(a.trade_count||'—'):'—'}</td></tr>`;
    });
  });
  html += '</tbody></table>';
  return html;
}

   US CREDIT — FINRA Market Breadth + FRED
══════════════════════════════════════ */
function chgCell(v, isBps=true) {
  if (v == null) return '<td class="t-val" style="color:var(--text3)">—</td>';
  const sign = v > 0 ? '+' : '';
  const cls  = v > 0 ? 't-pos' : v < 0 ? 't-neg' : '';
  const label = isBps ? `${sign}${v.toFixed(1)} bps` : `${sign}${v.toFixed(2)}%`;
  return `<td class="t-val ${cls}">${label}</td>`;
}

// ── Agency: FINRA totals (ALL) + UST reference ───────────────────
function buildAgencyFREDTable() {
  const finra  = DATA?.finra;
  const agency = finra?.agency;
  const fred   = DATA?.fred || {};
  const ust    = DATA?.us_treasury || {};
  const getY   = t => { const i=(ust.tenors||[]).indexOf(t); return i>=0&&ust.yields[i]!=null?ust.yields[i]:null; };
  const date   = finra?.date ? `<div style="padding:4px 12px 8px;font-size:9px;color:var(--text3)">Trade date: ${finra.date}</div>` : '';

  let finraBlock = '';
  const all = agency?.ALL;
  if (all) {
    // FINRA has ALL-level breadth data
    const vol  = all.dollar_volume_mm != null ? '$' + fmt(all.dollar_volume_mm, 0) + 'M' : '—';
    const adv  = all.advances  != null ? all.advances  : '—';
    const dec  = all.declines  != null ? all.declines  : '—';
    const unch = all.unchanged != null ? all.unchanged : '—';
    const total= all.total     > 0     ? all.total     : '—';
    const hi   = all.highs_52w != null ? all.highs_52w : '—';
    const lo   = all.lows_52w  != null ? all.lows_52w  : '—';
    const pctAdv = all.total > 0 && all.advances != null
      ? `<span style="font-size:9px;color:var(--text3)"> ${Math.round(all.advances/all.total*100)}%</span>` : '';
    const pctDec = all.total > 0 && all.declines != null
      ? `<span style="font-size:9px;color:var(--text3)"> ${Math.round(all.declines/all.total*100)}%</span>` : '';

    finraBlock = date + `
    <div style="padding:10px 12px 4px;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase">FINRA TRACE — Agency Market Breadth</div>
    <table class="bond-table"><thead><tr>
      <th>Market</th><th>$ Volume</th><th style="color:var(--green)">Adv</th><th style="color:var(--red)">Dec</th><th>Unch</th><th>Issues</th><th>52W Hi/Lo</th>
    </tr></thead><tbody>
      <tr>
        <td class="t-name" style="font-weight:600">All Agency</td>
        <td class="t-val">${vol}</td>
        <td class="t-val t-pos">${adv}${pctAdv}</td>
        <td class="t-val t-neg">${dec}${pctDec}</td>
        <td class="t-val">${unch}</td>
        <td class="t-val" style="color:var(--text3)">${total}</td>
        <td class="t-val">${hi} / ${lo}</td>
      </tr>
    </tbody></table>
    <div style="padding:3px 12px 10px;font-size:9px;color:var(--text3)">Issuer breakdown (FNMA/FHLB/FHLMC) requires FINRA Firm plan · $1,650/mo</div>`;
  }

  // Always show UST reference rates below
  const rows = [
    { label:'SOFR',        val:fred.sofr!=null?fmt(fred.sofr,2)+'%':'—',           chg1d:fred.sofr_chg_1d,    chg1w:fred.sofr_chg_1w,    chg1m:fred.sofr_chg_1m,    src:'FRED', bps:false },
    { label:'UST 2Y',      val:getY('2Y')!=null?fmt(getY('2Y'),2)+'%':'—',         chg1d:null,chg1w:null,chg1m:null, src:'US Tsy', bps:false },
    { label:'UST 5Y',      val:getY('5Y')!=null?fmt(getY('5Y'),2)+'%':'—',         chg1d:null,chg1w:null,chg1m:null, src:'US Tsy', bps:false },
    { label:'UST 10Y',     val:getY('10Y')!=null?fmt(getY('10Y'),2)+'%':'—',       chg1d:null,chg1w:null,chg1m:null, src:'US Tsy', bps:false },
    { label:'2Y–10Y Sprd', val:fred.t10y2y!=null?fmt(fred.t10y2y,2)+'%':'—',      chg1d:fred.t10y2y_chg_1d, chg1w:fred.t10y2y_chg_1w, chg1m:fred.t10y2y_chg_1m, src:'FRED', bps:false },
  ];
  const fredBlock = `
    <div style="padding:10px 12px 4px;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase">Reference Rates</div>
    <table class="bond-table"><thead><tr>
      <th>Indicator</th><th>Value</th><th>1D</th><th>1W</th><th>1M</th><th>Src</th>
    </tr></thead><tbody>
    ${rows.map(r=>`<tr>
      <td class="t-name">${r.label}</td>
      <td class="t-val">${r.val}</td>
      ${chgCell(r.chg1d,r.bps)}${chgCell(r.chg1w,r.bps)}${chgCell(r.chg1m,r.bps)}
      <td style="font-size:9px;color:var(--text3)">${r.src}</td>
    </tr>`).join('')}
    </tbody></table>`;

  return finraBlock + fredBlock;

function buildCorpFREDTable() {
  const finra   = DATA?.finra;
  const corp144 = finra?.corp144a;

  const fred    = DATA?.fred || {};
  const date    = finra?.date ? `<div style="padding:4px 12px 8px;font-size:9px;color:var(--text3)">Trade date: ${finra.date}</div>` : '';

  let finraBlock = '';
  // Show 144A totals if available, fall back to corp
  const sources = [];
  if (corp144?.ALL) sources.push({ label: 'Corp 144A', data: corp144.ALL });
  if (corp?.ALL)    sources.push({ label: 'Corporate',  data: corp.ALL });

  if (sources.length > 0) {
    const rows = sources.map(({ label, data: d }) => {
      const vol  = d.dollar_volume_mm != null ? '$' + fmt(d.dollar_volume_mm, 0) + 'M' : '—';
      const adv  = d.advances  != null ? d.advances  : '—';
      const dec  = d.declines  != null ? d.declines  : '—';
      const unch = d.unchanged != null ? d.unchanged : '—';
      const total= d.total > 0 ? d.total : '—';
      const hi   = d.highs_52w != null ? d.highs_52w : '—';
      const lo   = d.lows_52w  != null ? d.lows_52w  : '—';
      const pctAdv = d.total > 0 && d.advances != null
        ? `<span style="font-size:9px;color:var(--text3)"> ${Math.round(d.advances/d.total*100)}%</span>` : '';
      const pctDec = d.total > 0 && d.declines != null
        ? `<span style="font-size:9px;color:var(--text3)"> ${Math.round(d.declines/d.total*100)}%</span>` : '';
      return `<tr>
        <td class="t-name" style="font-weight:600">${label}</td>
        <td class="t-val">${vol}</td>
        <td class="t-val t-pos">${adv}${pctAdv}</td>
        <td class="t-val t-neg">${dec}${pctDec}</td>
        <td class="t-val">${unch}</td>
        <td class="t-val" style="color:var(--text3)">${total}</td>
        <td class="t-val">${hi} / ${lo}</td>
      </tr>`;
    }).join('');
    finraBlock = date + `
    <div style="padding:10px 12px 4px;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase">FINRA TRACE — Corporate Market Breadth</div>

      <th>Market</th><th>$ Volume</th><th style="color:var(--green)">Adv</th><th style="color:var(--red)">Dec</th><th>Unch</th><th>Issues</th><th>52W Hi/Lo</th>
    </tr></thead><tbody>${rows}</tbody></table>
    <div style="padding:3px 12px 10px;font-size:9px;color:var(--text3)">IG/HY/Convertibles breakdown requires FINRA Firm plan · $1,650/mo</div>`;
  }

  // Always show FRED OAS spreads
  if (!fred.ig_spread_bps && !fred.hy_spread_bps) return finraBlock || noData('Data not loaded');

const CC = {US:'#f5a623',EU:'#58a6ff',Japan:'#3fb950',UK:'#bc8cff',Germany:'#39c5cf'};
const GOV_TENORS_LABELS = ['3M','1Y','2Y','5Y','10Y','20Y','30Y'];

function buildGovDatasets() {
  const ust = DATA?.us_treasury || {};
  const ecb = DATA?.ecb || {};
  const boj = DATA?.boj || {};
  const datasets = [];
  // Build US from Treasury data
  if (ust.tenors) {
    const map = Object.fromEntries(ust.tenors.map((t,i)=>[t,ust.yields[i]]));
    const vals = GOV_TENORS_LABELS.map(t=>map[t]??null);
    if (vals.some(v=>v!=null))
      datasets.push({key:'US',label:'United States',color:'#f5a623',data:vals,active:true});
  }
  // EU from ECB
  if (ecb.tenors) {
    const map = Object.fromEntries(ecb.tenors.map((t,i)=>[t,ecb.yields[i]]));
    const vals = GOV_TENORS_LABELS.map(t=>map[t]??null);
    if (vals.some(v=>v!=null))
      datasets.push({key:'EU',label:'EU (AAA)',color:'#58a6ff',data:vals,active:true});
  }
  // Japan from BOJ
  if (boj.tenors) {
    const map = Object.fromEntries(boj.tenors.map((t,i)=>[t,boj.yields[i]]));
    const vals = GOV_TENORS_LABELS.map(t=>map[t]??null);
    if (vals.some(v=>v!=null))
      datasets.push({key:'JP',label:'Japan',color:'#3fb950',data:vals,active:true});
  }
  // UK from uk_gilts
  if (DATA?.uk_gilts?.tenors) {
    const g = DATA.uk_gilts;
    const map = Object.fromEntries(g.tenors.map((t,i)=>[t,g.yields[i]]));
    const vals = GOV_TENORS_LABELS.map(t=>map[t]??null);
    if (vals.some(v=>v!=null))
      datasets.push({key:'UK',label:'United Kingdom',color:'#bc8cff',data:vals,active:true});
  }
  return datasets;
}

let govDatasets = [];

function renderGovControls() {
  const c = $('gov-controls'); if(!c) return;
  c.innerHTML = govDatasets.map(co=>`
    <label class="gov-check" onclick="toggleCountry('${co.key}')">
      <div class="check-dot" style="background:${co.active?co.color:'#333'};box-shadow:${co.active?`0 0 6px ${co.color}44`:'none'};border:1px solid ${co.active?co.color:'#444'}"></div>

function toggleCountry(key) {
  const co = govDatasets.find(c=>c.key===key);

}
function updateGovChart() {
  if(!govChart) return;
  govChart.data.datasets = govDatasets.filter(c=>c.active).map(c=>({
    label:c.label,data:c.data,borderColor:c.color,backgroundColor:c.color+'15',
    borderWidth:2.5,pointRadius:4,pointHoverRadius:7,tension:0.3,fill:false,
    spanGaps:true,
  }));
  govChart.update('active');
}

function initGovChart() {
  const ctx = $('govBondsChart'); if(!ctx||govChart) return;
  govDatasets = buildGovDatasets();
  govChart = new Chart(ctx,{type:'line',data:{labels:GOV_TENORS_LABELS,datasets:[]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{boxWidth:12,padding:14}},tooltip:{backgroundColor:'#1a2333',borderColor:'#243447',borderWidth:1,callbacks:{label:c=>`  ${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(2)+'%':'—'}`}}},

function renderSpreadMatrix() {
  const t = $('spread-matrix-table'); if(!t) return;

  const usT10idx = GOV_TENORS_LABELS.indexOf('10Y');

  let html = `<thead><tr><th>Country</th>${GOV_TENORS_LABELS.map(l=>`<th>${l}</th>`).join('')}<th>vs UST 10Y</th></tr></thead><tbody>`;
  govDatasets.forEach(co => {
    const coT10 = co.data[usT10idx];

      ${co.data.map(v=>`<td class="t-val">${v!=null?fmt(v,2)+'%':'—'}</td>`).join('')}

  });

}

      {label:'HY OAS (bps/10)',
       data:(fred.spread_history_hy||[]).map(v=>v!=null?+(v/10).toFixed(2):null),

/* Derivatives — heatmap (illustrative roll structure — no free real-time source exists) */
const FUTURES_TENORS=['2Y','3Y','5Y','7Y','10Y','20Y','30Y','Ultra T','Bund','JGB'];
const CONTRACT_MONTHS=['Mar25','Jun25','Sep25','Dec25','Mar26','Jun26','Sep26','Dec26','Mar27','Jun27'];
function heatColor(v,mn,mx){if(v>0){const t=Math.min(v/mx,1);return`rgba(63,185,80,${0.15+t*0.65})`;}else{const t=Math.min(Math.abs(v)/Math.abs(mn),1);return`rgba(248,81,73,${0.15+t*0.65})`;}}
function renderHeatmap(type){
  const SEED=type==='ust'?100.12:type==='bund'?135.48:type==='jgb'?149.2:98.4;
  const data=[];
  for(let r=0;r<FUTURES_TENORS.length;r++){const row=[];for(let c=0;c<CONTRACT_MONTHS.length;c++){const spread=+(((Math.random()-0.52)*0.6+(c*0.04)+(r>4?-0.05:0.02)).toFixed(3));const price=+(SEED-(r*2.1)+c*0.04+(Math.random()-0.5)*0.08).toFixed(3);row.push({price,spread});}data.push(row);}
  $('hm-col-labels').innerHTML='<div style="min-width:90px"></div>'+CONTRACT_MONTHS.map(m=>`<div class="hm-label">${m}</div>`).join('');
  $('hm-row-labels').innerHTML=FUTURES_TENORS.map(t=>`<div class="hm-row-label" style="height:38px;line-height:36px">${t}</div>`).join('');
  const cells=$('heatmap-cells');cells.style.gridTemplateColumns=`repeat(${CONTRACT_MONTHS.length},1fr)`;cells.innerHTML='';
  const spreads=data.flat().map(x=>x.spread),minS=Math.min(...spreads),maxS=Math.max(...spreads);
  data.forEach((row,ri)=>row.forEach((cell,ci)=>{
    const div=document.createElement('div');div.className='hm-cell';div.style.background=heatColor(cell.spread,minS,maxS);
    const isC=cell.spread>=0;
    div.innerHTML=`<span>${cell.price}</span><span class="hm-sub ${isC?'t-pos':'t-neg'}">${isC?'+':''}${cell.spread}</span>`;
    div.addEventListener('mouseenter',()=>{const tip=$('hm-tooltip');tip.style.display='block';tip.innerHTML=`<strong>${FUTURES_TENORS[ri]} — ${CONTRACT_MONTHS[ci]}</strong>Price: <span class="t-val">${cell.price}</span><br>Roll Spread: <span class="${isC?'t-pos':'t-neg'}">${cell.spread}</span><br>Structure: <span class="${isC?'t-pos':'t-neg'}">${isC?'CONTANGO':'BACKWARDATION'}</span>`;});
    div.addEventListener('mousemove',e=>{const tip=$('hm-tooltip');tip.style.left=e.clientX+12+'px';tip.style.top=e.clientY-60+'px';});
    div.addEventListener('mouseleave',()=>{$('hm-tooltip').style.display='none';});
    cells.appendChild(div);
  }));
  $('hm-legend').innerHTML=`<div class="legend-item"><div class="legend-dot" style="background:rgba(63,185,80,0.7)"></div>Contango</div><div class="legend-item"><div class="legend-dot" style="background:rgba(248,81,73,0.7)"></div>Backwardation</div><div style="margin-left:auto;font-size:9px;color:var(--text3)">⚠ Illustrative structure — no free real-time futures API</div>`;
}
function renderVolSurface(){
  const expiries=['1M','3M','6M','1Y','2Y','5Y'],tenors2=['1Y','2Y','5Y','10Y','20Y','30Y'];
  const base=[[42,56,64,72,68,61],[38,51,59,67,63,57],[34,47,55,63,59,53],[28,41,49,57,53,47],[22,34,43,51,47,41],[15,26,36,44,40,35]];
  $('vs-col-labels').innerHTML='<div style="min-width:70px"></div>'+tenors2.map(t=>`<div class="hm-label">${t}</div>`).join('');
  $('vs-row-labels').innerHTML=expiries.map(e=>`<div class="hm-row-label" style="height:34px;line-height:32px">${e}</div>`).join('');
  const grid=$('vol-surface-cells');grid.style.gridTemplateColumns=`repeat(${tenors2.length},1fr)`;grid.style.gap='2px';grid.innerHTML='';
  const flat=base.flat(),mn=Math.min(...flat),mx=Math.max(...flat);
  base.forEach(row=>row.forEach(v=>{const t=(v-mn)/(mx-mn);const r=Math.round(88+t*167),g=Math.round(185*(1-t*0.8)),b=Math.round(80*(1-t));const div=document.createElement('div');div.className='hm-cell';div.style.height='32px';div.style.background=`rgba(${r},${g},${b},${0.2+t*0.55})`;div.innerHTML=`<span>${v}</span>`;grid.appendChild(div);}));
}
function initOIChart(){
  const ctx=$('oiChart');if(!ctx||oiChartInst)return;
  oiChartInst=new Chart(ctx,{type:'bar',data:{labels:['2Y','3Y','5Y','7Y','10Y','20Y','30Y'],datasets:[
    {label:'Open Interest',data:[124,89,312,187,426,94,231],backgroundColor:'rgba(88,166,255,0.5)',borderColor:'#58a6ff',borderWidth:1},
    {label:'Volume',data:[88,62,248,134,318,71,167],backgroundColor:'rgba(245,166,35,0.4)',borderColor:'#f5a623',borderWidth:1},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10}},tooltip:{backgroundColor:'#1a2333',borderColor:'#243447',borderWidth:1}},scales:{x:{grid:{color:'#1e2d3d'},ticks:{color:'#8b949e'}},y:{grid:{color:'#1e2d3d'},ticks:{color:'#8b949e'},title:{display:true,text:'000s contracts',color:'#4a5568'}}}}});
}
function switchFuturesTab(type,btn){document.querySelectorAll('.tab-bar .tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderHeatmap(type);}

/* ── SECTION NAV ── */
function showSection(id, btn) {
  currentSection = id;
  document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const sec = $('sec-'+id);
  if(sec) sec.classList.add('active');
  if(btn) btn.classList.add('active');
  setTimeout(() => initChartsForSection(id), 60);
}
function initChartsForSection(sec){
  if(sec==='curves'){initYieldCurveChart();initSpreadChart();}
  else if(sec==='derivatives'){renderHeatmap('ust');renderVolSurface();initOIChart();}
  else if(sec==='govbonds'){initGovChart();}
}
