name: Update Bond Market Data

on:
  schedule:
    # Every Monday at 06:00 UTC (markets open, previous week data published)
    - cron: "0 6 * * 1"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

permissions:
  contents: write      # needed to commit data/bonds.json back to repo

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # No pip installs needed — only stdlib (urllib, json, xml, os, re)

      - name: Fetch all bond market data
        env:
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          FINRA_CLIENT_ID:     ${{ secrets.FINRA_CLIENT_ID }}
          FINRA_CLIENT_SECRET: ${{ secrets.FINRA_CLIENT_SECRET }}
        run: python fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bonds.json
          # Only commit if file changed
          git diff --cached --quiet || git commit -m "chore: update bond market data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
